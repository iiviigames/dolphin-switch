name: Build Dolphin Emulator for Switch

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install DevKitPro and libnx
      run: |
        sudo apt-get update
        sudo apt-get install -y git cmake build-essential
        
        # Install DevKitPro
        export DEVKITPRO=/opt/devkitpro
        sudo mkdir -p $DEVKITPRO
        sudo git clone --recursive https://github.com/devkitPro/pacman.git $DEVKITPRO/pacman
        cd $DEVKITPRO/pacman
        sudo make install
        
        # Add to PATH for next steps
        echo "DEVKITPRO=$DEVKITPRO" >> $GITHUB_ENV
        echo "$DEVKITPRO/bin" >> $GITHUB_PATH

    - name: Build Dolphin
      run: |
        mkdir build
        cd build
        aarch64-none-elf-cmake -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake ..
        make -j$(nproc)

    - name: Upload build artifacts
      uses: actions/upload-artifact@v2
      with:
        name: dolphin-switch-build
        path: build/
